format = """
[оӮ¶](#3B4252)\
$username\
[оӮ°](bg:#434C5E fg:#3B4252)\
$directory\
[оӮ°](fg:#434C5E bg:#4C566A)\
$git_branch\
$git_status\
[оӮ°](fg:#4C566A bg:#86BBD8)\
[$c\
$dart\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$zig\
$php\
$python](fg:#292e42 bg:#86BBD8 bold)\
[оӮ°](fg:#86BBD8 bg:#06969A)\
$docker_context\
[оӮ°](fg:#06969A bg:#33658A)\
$cmd_duration\
[оӮҙ ](fg:#33658A)\
"""
command_timeout = 5000
# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like п„  to save some space
[username]
show_always = true
style_user = "bg:#3B4252"
style_root = "bg:#3B4252"
format = '[$user ]($style)'

[directory]
style = "bg:#434C5E"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

version_color = "fg:#292e42 bg:#86BBD8 bold"

[c]
symbol = "оҳһ "
format = ' $symbol ($version) '

[cmd_duration]
style = "bg:#33658A"
format = '[ took $duration ]($style)'

[dart]
symbol = "оҷҢ "
format = ' $symbol ($version) '

[docker_context]
symbol = "пҢҲ "
style = "bg:#06969A"
format = '[ $symbol $context ]($style) $path'

[git_branch]
symbol = " п„“ "
style = "bg:#4C566A"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#4C566A"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
format = ' $symbol ($version) '

[haskell]
symbol = "оқ· "
format = ' $symbol ($version) '

[java]
symbol = "оү– "
format = ' $symbol ($version) '


[nodejs]
symbol = "оңҳ "
format = ' $symbol ($version) '

[nim]
symbol = "nim оҷ· "
format = ' $symbol ($version) '

[php]
symbol = "оөӯ  "
format = ' $symbol ($version) '

[python]
symbol = "оҳҶ "
format = ' $symbol ($version) (\($virtualenv\)) '
python_binary = [
  "./venv/bin/python",
  "./.venv/bin/python",
  "python",
  "python3",
  "python2",
]
# python_binary = ['./venv/bin/python', 'python', 'python3', 'python2']

[rust]
symbol = " оһЁ "
format = ' $symbol ($version) '

[zig]
symbol = " оҡ© "
format = ' $symbol ($version) '
